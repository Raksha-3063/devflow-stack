<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevFlow - Developer Q&A Platform</title>
  <!-- Google Fonts: Outfit & Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- FontAwesome 6.x for Modern Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <!-- Core Stylesheet -->
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <div id="app">
    <!-- The header and sidebar will be dynamically rendered or static inside the shell -->
    <header id="header" class="glass-header"></header>
    <div id="layout-body">
      <aside id="sidebar" class="glass-sidebar"></aside>
      <main id="main-content" class="fade-in-container"></main>
    </div>
  </div>
  
  <!-- Dynamic notifications container -->
  <div id="toast-container"></div>

  <!-- App Bootstrapper -->
  <script type="module" src="app.js"></script>
</body>
</html>
